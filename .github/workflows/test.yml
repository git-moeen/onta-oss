name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short
        env:
          OMNIX_API_KEYS: '{"test-key": "test-tenant"}'
          OMNIX_NEPTUNE_ENDPOINT: "http://fake-neptune:8182"
          PYTHONPATH: ${{ github.workspace }}

  # TS SDK (packages/cograph) — typecheck, build, and unit tests (vitest).
  ts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace packages/cograph

      - name: Build all packages
        run: npm run build --workspaces

      - name: Run TS tests
        run: npm test --workspaces --if-present
