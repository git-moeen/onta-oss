name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Scratch Postgres with the pgvector extension for the DSN-gated semantic
    # index integration tests (ONTA-176). The main pytest step deliberately
    # does NOT get the DSN (the PostGIS-gated spatiotemporal test would fail —
    # this image has no PostGIS); a dedicated step below exports it for the
    # semantic test files only.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short
        env:
          OMNIX_API_KEYS: '{"test-key": "test-tenant"}'
          OMNIX_NEPTUNE_ENDPOINT: "http://fake-neptune:8182"
          PYTHONPATH: ${{ github.workspace }}

      # DSN-gated pgvector integration tests (ONTA-176): re-run the semantic
      # test files with the service-container DSN so the live-Postgres tests
      # (skipped above) execute. Kept as a separate step so the DSN never
      # reaches tests that need other extensions (e.g. PostGIS).
      - name: Run semantic pgvector integration tests
        run: |
          source .venv/bin/activate
          pytest tests/test_semantic_postgres.py tests/test_semantic_parity.py -v --tb=short
        env:
          OMNIX_API_KEYS: '{"test-key": "test-tenant"}'
          OMNIX_NEPTUNE_ENDPOINT: "http://fake-neptune:8182"
          OMNIX_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          PYTHONPATH: ${{ github.workspace }}

  # TS SDK (packages/cograph) — typecheck, build, and unit tests (vitest).
  ts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace packages/cograph

      - name: Build all packages
        run: npm run build --workspaces

      - name: Run TS tests
        run: npm test --workspaces --if-present
